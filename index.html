<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima de Aula — Salesianos Triana</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root{
    --bg:#F5F0E6; --panel:#FFFDF8; --ink:#22312C; --ink-soft:#5B6B62;
    --azulejo:#2B5876; --azulejo-dark:#1E3A3A; --sage:#6E8B5A; --amber:#C98A2E; --coral:#B5533C;
    --line:#E4DBC8; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Work Sans',sans-serif;overflow-x:hidden;}
  #app{display:flex;min-height:100vh;max-width:100%;}
  #sidebar{
    width:250px;flex-shrink:0;background:var(--azulejo-dark);color:#F5F0E6;padding:22px 18px;
    display:flex;flex-direction:column;gap:18px;
    background-image:linear-gradient(135deg, rgba(43,88,118,.55) 25%, transparent 25%),linear-gradient(225deg, rgba(43,88,118,.55) 25%, transparent 25%);
    background-size:26px 26px;
  }
  #sidebar h1{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700;margin:0 0 2px;line-height:1.15;}
  #sidebar .tag{font-size:.72rem;opacity:.7;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;}
  .selectorBlock{background:rgba(255,255,255,.07);border-radius:var(--radius);padding:12px;}
  .selectorBlock label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;opacity:.75;margin-bottom:4px;}
  .selectorBlock select, .selectorBlock input{
    width:100%;padding:7px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.25);
    background:rgba(255,255,255,.95);color:var(--ink);font-family:'Work Sans',sans-serif;font-size:.85rem;margin-bottom:8px;
  }
  .miniBtn{padding:6px 12px;border:1px dashed rgba(255,255,255,.4);background:transparent;color:#F5F0E6;border-radius:6px;cursor:pointer;font-size:.78rem;font-family:'Work Sans',sans-serif;}
  .miniBtn:hover{background:rgba(255,255,255,.1);}
  nav{display:flex;flex-direction:column;gap:2px;margin-top:4px;}
  nav button{text-align:left;background:transparent;border:none;color:#E9E4D6;padding:9px 10px;border-radius:7px;font-family:'Work Sans',sans-serif;font-size:.88rem;cursor:pointer;display:flex;align-items:center;gap:8px;}
  nav button:hover{background:rgba(255,255,255,.08);}
  nav button.active{background:#F5F0E6;color:var(--azulejo-dark);font-weight:600;}
  #main{flex:1;min-width:0;padding:26px 34px;overflow:auto;}
  h2{font-family:'Fraunces',serif;font-size:1.5rem;margin:0 0 4px;color:var(--azulejo-dark);}
  .subtitle{color:var(--ink-soft);font-size:.92rem;margin-bottom:20px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  .cardGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .statCard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .statCard .grupoName{font-family:'Fraunces',serif;font-weight:600;font-size:1.05rem;color:var(--azulejo-dark);}
  .statCard .num{font-family:'IBM Plex Mono',monospace;font-size:1.9rem;margin:6px 0 2px;}
  .statCard .lbl{font-size:.75rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;margin-top:6px;}
  .badge.ok{background:#E7EEDF;color:var(--sage);}
  .badge.warn{background:#F6EBD8;color:var(--amber);}
  .badge.alert{background:#F5E1DB;color:var(--coral);}
  label.field{display:block;font-size:.82rem;color:var(--ink-soft);margin:12px 0 4px;font-weight:500;}
  input[type=text],input[type=date],textarea,select.formSel{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-family:'Work Sans',sans-serif;font-size:.9rem;background:#fff;}
  textarea{resize:vertical;min-height:60px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .row>div{flex:1;min-width:160px;}
  .scaleQ{border-top:1px solid var(--line);padding:16px 0;}
  .scaleQ .qtext{font-size:1rem;margin-bottom:10px;}
  .scaleQ.discreta{background:#FBF3EC;margin:0 -20px;padding:16px 20px;border-top:1px solid #EBD9C7;border-bottom:1px solid #EBD9C7;}
  .scaleBtns{display:flex;gap:8px;}
  .scaleBtns button{flex:1;padding:12px 0;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:1.05rem;}
  .scaleBtns button.sel{background:var(--azulejo);color:#fff;border-color:var(--azulejo);}
  .tile{width:56px;height:56px;border-radius:8px;border:2px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.4rem;background:#fff;}
  .tile.sel-green{background:#E7EEDF;border-color:var(--sage);}
  .tile.sel-amber{background:#F6EBD8;border-color:var(--amber);}
  .tile.sel-red{background:#F5E1DB;border-color:var(--coral);}
  .semaforoBtns{display:flex;gap:10px;margin-top:6px;}
  .btnPrimary{background:var(--azulejo);color:#fff;border:none;padding:11px 20px;border-radius:7px;cursor:pointer;font-family:'Work Sans',sans-serif;font-weight:600;font-size:.95rem;margin-top:16px;}
  .btnPrimary:hover{background:var(--azulejo-dark);}
  .btnPrimary:disabled{opacity:.5;cursor:not-allowed;}
  .btnGhost{background:transparent;border:1px solid var(--line);padding:8px 14px;border-radius:7px;cursor:pointer;font-size:.85rem;}
  .btnDanger{color:var(--coral);border-color:#EBCFC5;}
  table{width:100%;border-collapse:collapse;font-size:.87rem;}
  th{text-align:left;color:var(--ink-soft);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--line);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;}
  td{padding:7px 8px;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .empty{color:var(--ink-soft);font-size:.88rem;padding:20px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius);}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--azulejo-dark);color:#fff;padding:10px 16px;border-radius:8px;font-size:.85rem;box-shadow:0 4px 14px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}
  .legend{display:flex;gap:16px;font-size:.78rem;color:var(--ink-soft);margin-top:10px;flex-wrap:wrap;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;background:#EFEAdc;color:var(--ink-soft);}
  .pill.activa{background:#E7EEDF;color:var(--sage);font-weight:600;}

  /* --- Modo alumno --- */
  #alumnoWrap{max-width:560px;margin:0 auto;padding:34px 20px;min-height:100vh;}
  #alumnoWrap h1{font-family:'Fraunces',serif;color:var(--azulejo-dark);font-size:1.6rem;margin-bottom:2px;}
  .progressBar{height:6px;background:var(--line);border-radius:4px;margin:16px 0 26px;overflow:hidden;}
  .progressBar .fill{height:100%;background:var(--azulejo);transition:width .25s;}
  .stepCard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;}
  .bigChoice{display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:8px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-size:.95rem;font-family:'Work Sans',sans-serif;}
  .bigChoice:hover{border-color:var(--azulejo);}
</style>
</head>
<body>

<div id="alumnoWrap" style="display:none;"></div>
<div id="app" style="display:none;">
  <div id="sidebar">
    <div>
      <div class="tag">Salesianos Triana</div>
      <h1>Clima de Aula</h1>
    </div>
    <div class="selectorBlock">
      <label>Curso académico</label>
      <select id="selCurso"></select>
      <div style="display:flex;gap:6px;">
        <input type="text" id="inputNuevoCurso" placeholder="Ej: 2026-2027" style="margin-bottom:0;">
        <button class="miniBtn" id="btnNuevoCurso">Crear</button>
      </div>
    </div>
    <div class="selectorBlock">
      <label>Grupo</label>
      <select id="selGrupo"></select>
      <div style="display:flex;gap:6px;">
        <input type="text" id="inputNuevoGrupo" placeholder="Ej: 2ESO-A" style="margin-bottom:0;">
        <button class="miniBtn" id="btnNuevoGrupo">Crear</button>
      </div>
    </div>
    <nav id="nav">
      <button data-view="resumen">📊 Resumen</button>
      <button data-view="alumnado">🧑‍🎓 Alumnado</button>
      <button data-view="rondas">📋 Encuesta trimestral</button>
      <button data-view="semaforo">🚦 Semáforo semanal</button>
      <button data-view="evolucion">📈 Evolución</button>
      <button data-view="alertas">🔔 Alertas</button>
    </nav>
    <div style="margin-top:auto;font-size:.7rem;opacity:.55;">Firebase: clima-aula</div>
  </div>
  <div id="main"></div>
</div>
<div class="toast" id="toast"></div>
